apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sandbox

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: ghost-smtp
    envs:
      - smtp.env

configMapGenerator:
  - name: ghost-config
    files:
      - config.production.json

resources:
  - ../../base
  - middleware-ghost.yaml
  - ingress.yaml

patches:
  - path: patch-deployment.yaml
  - path: patch-pvc.yaml
